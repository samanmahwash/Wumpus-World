<!DOCTYPE html>
<html>
<head>
  <title>Wumpus World Knowledge Agent</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#ffffff,#ffe4ec);
      color:#1f2937;
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:100vh;
    }
    h2{
      margin-top:18px;
      font-weight:600;
      color:#be185d;
    }
    .controls{
      margin:12px;
      background:rgba(255,255,255,0.9);
      padding:12px;
      border-radius:14px;
      display:flex;
      gap:10px;
      align-items:center;
      border:1px solid #f9a8d4;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
    }
    input{
      background:white;
      color:#111827;
      border:1px solid #f9a8d4;
      padding:4px;
      border-radius:6px;
    }
    button{
      background:#f472b6;
      color:white;
      cursor:pointer;
      font-weight:600;
      border-radius:8px;
      padding:6px 10px;
      border:none;
      transition:0.2s;
    }
    button:hover{background:#ec4899}

    .layout{
      display:flex;
      gap:20px;
      margin:12px 16px 20px;
      align-items:flex-start;
      width:calc(100% - 32px);
      max-width:960px;
    }
    .grid-wrap{
      flex:1 1 auto;
      min-width:0;
      background:rgba(255,255,255,0.95);
      border:1px solid #f9a8d4;
      border-radius:16px;
      padding:14px;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
    }

    #grid{
      display:grid;
      gap:6px;
      width:100%;
    }

    .cell{
      aspect-ratio:1;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:12px;
      font-weight:500;
      border-radius:10px;
      border:1px solid #fbcfe8;
      transition:0.2s;
    }
    .safe{background:#dcfce7;color:#166534}
    .unknown{background:#f3f4f6;color:#6b7280}
    .danger{background:#fee2e2;color:#991b1b}
    .agent{background:#f9a8d4;color:#831843;font-weight:bold}

    /* Right panel fixed width */
    .panel{
      width:280px;
      flex-shrink:0;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .stats-box{
      background:rgba(255,255,255,0.95);
      border:1px solid #f9a8d4;
      border-radius:14px;
      padding:12px 14px;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
    }
    .stats-box .row{
      display:flex;
      justify-content:space-between;
      font-size:13px;
      padding:3px 0;
      border-bottom:1px solid #fce7f3;
    }
    .stats-box .row:last-child{border-bottom:none}
    .stats-box .label{color:#9d174d}
    .stats-box .val{font-weight:600;color:#1f2937}

    .log-box{
      background:rgba(255,255,255,0.95);
      border:1px solid #f9a8d4;
      border-radius:14px;
      padding:12px 14px;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
      overflow-y:auto;
      max-height:420px;
    }
    .log-box b{
      display:block;
      font-size:13px;
      color:#be185d;
      margin-bottom:6px;
    }
    #log div{
      font-size:12px;
      padding:3px 0;
      color:#374151;
      border-bottom:1px solid #fce7f3;
      line-height:1.4;
    }
    #log div:last-child{border-bottom:none}
  </style>
</head>
<body>

<h2>Wumpus World Knowledge-Based Agent</h2>

<div class="controls">
  Rows <input id="rows" value="4" style="width:50px">
  Cols <input id="cols" value="4" style="width:50px">
  <button onclick="start()">Start</button>
  <button onclick="move()">Next Move</button>
</div>

<div class="layout">

  <div class="grid-wrap">
    <div id="grid"></div>
  </div>

  <div class="panel">
    <div class="stats-box">
      <div class="row"><span class="label">Steps</span><span class="val" id="s-steps">0</span></div>
      <div class="row"><span class="label">Inferences</span><span class="val" id="s-inf">0</span></div>
      <div class="row"><span class="label">Percepts</span><span class="val" id="s-perc">—</span></div>
    </div>
    <div class="log-box">
      <b>Inference Log</b>
      <div id="log"></div>
    </div>
  </div>

</div>

<script>
let world, KB = [];
let steps = 0;
let inferenceSteps = 0;
let gameOver = false;

function log(msg){
  const l = document.getElementById("log");
  l.innerHTML += `<div>${msg}</div>`;
  l.scrollTop = l.scrollHeight;
}

function createWorld(r, c){
  let grid = Array.from({length:r}, () => Array.from({length:c}, () => ({pit:false, w:false})));
  function rand(){ return [Math.floor(Math.random()*r), Math.floor(Math.random()*c)] }
  let [px,py] = rand();
  if(px!==0||py!==0) grid[px][py].pit = true;
  let [wx,wy] = rand();
  if(wx!==0||wy!==0) grid[wx][wy].w = true;
  return { grid, agent:{x:0,y:0}, visited:new Set(["0,0"]) };
}

function neighbors(x, y){
  return [[1,0],[-1,0],[0,1],[0,-1]]
    .map(([dx,dy]) => [x+dx, y+dy])
    .filter(([nx,ny]) => world.grid[nx]?.[ny] !== undefined);
}

function addClause(c){
  const key = JSON.stringify([...c].sort());
  if(!KB.some(k => JSON.stringify([...k].sort()) === key)) KB.push(c);
}

function negate(l){ return l.startsWith("¬") ? l.slice(1) : "¬"+l }

function tell(percepts){
  let {x,y} = world.agent;
  let n = neighbors(x, y);
  if(percepts.includes("B")){
    addClause(n.map(([nx,ny]) => `P${nx}${ny}`));
    log(`[${x},${y}] Breeze — pit nearby`);
  } else {
    n.forEach(([nx,ny]) => addClause([`¬P${nx}${ny}`]));
    log(`[${x},${y}] No breeze — neighbors pit-free`);
  }
  if(percepts.includes("S")){
    addClause(n.map(([nx,ny]) => `W${nx}${ny}`));
    log(`[${x},${y}] Stench — Wumpus nearby`);
  } else {
    n.forEach(([nx,ny]) => addClause([`¬W${nx}${ny}`]));
    log(`[${x},${y}] No stench — no Wumpus near`);
  }
}

function resolve(ci, cj){
  let res = [];
  for(let li of ci){
    for(let lj of cj){
      if(li === negate(lj)){
        let newC = [...new Set([...ci.filter(x=>x!==li), ...cj.filter(x=>x!==lj)])];
        res.push(newC);
      }
    }
  }
  return res;
}

function resolution(KB, query){
  let clauses = KB.map(c => [...c]);
  clauses.push([negate(query)]);
  let changed = true, limit = 300;
  while(changed && limit--){
    changed = false;
    let newClauses = [];
    for(let i=0; i<clauses.length; i++){
      for(let j=i+1; j<clauses.length; j++){
        let rs = resolve(clauses[i], clauses[j]);
        for(let r of rs){
          inferenceSteps++;
          if(r.length === 0){ log("Contradiction found — query proved"); return true; }
          newClauses.push(r);
        }
      }
    }
    for(let c of newClauses){
      if(!clauses.some(x => JSON.stringify(x.sort()) === JSON.stringify(c.sort()))){
        clauses.push(c);
        changed = true;
      }
    }
  }
  return false;
}

function ASK(q){ return resolution(KB, q) }
function isSafe(x, y){ return !ASK(`P${x}${y}`) && !ASK(`W${x}${y}`) }

function checkWin(){
  let r = world.grid.length, c = world.grid[0].length;
  let total = 0, visited = 0;
  for(let i=0; i<r; i++) for(let j=0; j<c; j++){
    if(!world.grid[i][j].pit && !world.grid[i][j].w){
      total++;
      if(world.visited.has(`${i},${j}`)) visited++;
    }
  }
  if(visited === total){ gameOver = true; log("All safe cells explored. You win!"); alert("You win!"); }
}

function percepts(){
  let {x,y} = world.agent, p = [];
  for(let [nx,ny] of neighbors(x,y)){
    if(world.grid[nx][ny].pit) p.push("B");
    if(world.grid[nx][ny].w) p.push("S");
  }
  return p;
}

function choose(){
  let {x,y} = world.agent;
  for(let [nx,ny] of neighbors(x,y)){
    if(!world.visited.has(`${nx},${ny}`) && isSafe(nx,ny)){
      log(`Safe move chosen: [${nx},${ny}]`);
      return {x:nx, y:ny};
    }
  }
  return null;
}

function move(){
  if(gameOver) return;
  let {x,y} = world.agent;
  if(world.grid[x][y].pit || world.grid[x][y].w){
    gameOver = true; log("Agent died!"); alert("Game Over"); return;
  }
  let p = percepts();
  tell(p);
  let next = choose();
  if(!next){ log("No safe move found."); render(p); return; }
  world.agent = next;
  world.visited.add(`${next.x},${next.y}`);
  steps++;
  checkWin();
  render(p);
}

function render(p = []){
  const g = document.getElementById("grid");
  g.innerHTML = "";
  let r = world.grid.length, c = world.grid[0].length;
  g.style.gridTemplateColumns = `repeat(${c}, 1fr)`;
  for(let i=0; i<r; i++){
    for(let j=0; j<c; j++){
      let d = document.createElement("div");
      d.className = "cell";
      if(world.agent.x===i && world.agent.y===j)       d.classList.add("agent");
      else if(world.grid[i][j].pit||world.grid[i][j].w) d.classList.add("danger");
      else if(world.visited.has(`${i},${j}`))           d.classList.add("safe");
      else                                               d.classList.add("unknown");
      d.textContent = `${i},${j}`;
      g.appendChild(d);
    }
  }
  document.getElementById("s-steps").textContent = steps;
  document.getElementById("s-inf").textContent = inferenceSteps;
  document.getElementById("s-perc").textContent = p.length ? p.join(", ") : "None";
}

function start(){
  let r = +rows.value, c = +cols.value;
  world = createWorld(r, c);
  KB = []; steps = 0; inferenceSteps = 0; gameOver = false;
  document.getElementById("log").innerHTML = "";
  log("World created. Press Next Move to begin.");
  render();
}
</script>
</body>
</html>
